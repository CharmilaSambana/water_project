<!DOCTYPE html>
<html>
<head>
    <title>Water Monitoring System</title>

    <style>
        body {
            font-family: Arial;
            background: #eef3ff;
            text-align: center;
        }

        .box {
            width: 60%;
            margin: auto;
            margin-top: 50px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px #ccc;
        }

        input, button {
            padding: 10px;
            margin: 10px;
        }

        button {
            background: #2d89ef;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #1b5fa7;
        }

        .result {
            margin-top: 20px;
            text-align: left;
            background: #f7f9ff;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>💧 Water Usage Monitoring System</h1>

    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br>
        <button type="submit">Upload Excel</button>
    </form>

    {% if result %}
    <div class="result">
        <h2>📊 Analysis Report</h2>
        <p>{{ result | safe }}</p>
    </div>
    {% endif %}

</div>

</body>
</html>
