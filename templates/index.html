<!DOCTYPE html>
<html>
<head>
    <title>Water Usage Monitoring System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef3ff;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            width: 65%;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
        }

        input[type="file"] {
            margin: 20px 0;
        }

        button {
            padding: 10px 20px;
            background: #2d89ef;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1b5fa7;
        }

        .note {
            font-size: 14px;
            color: #555;
        }

        .result {
            margin-top: 25px;
            text-align: left;
            background: #f7f9ff;
            padding: 20px;
            border-radius: 10px;
            border-left: 6px solid #2d89ef;
        }

        .error {
            margin-top: 20px;
            color: red;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>💧 Water Usage Monitoring System</h1>

    <p class="note">
        Upload your data file (Excel / CSV / PDF) to analyze water usage.
    </p>

    <!-- Upload Form -->
    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br>
        <button type="submit">Upload & Analyze</button>
    </form>

    <!-- Result Section -->
    {% if result %}
    <div class="result">
        <h2>📊 Analysis Report</h2>
        <p>{{ result | safe }}</p>
    </div>
    {% endif %}

    <!-- Error Section -->
    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}

</div>

</body>
</html>
