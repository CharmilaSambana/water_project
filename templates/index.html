<!DOCTYPE html>
<html>
<head>
    <title>Water Balance Analysis</title>
</head>
<body style="text-align:center; margin-top:50px; font-family:Arial;">

    <h1>💧 Water Balance Analysis</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br><br>
        <button type="submit">Upload & Analyze</button>
    </form>

    <br><br>

    {% if result %}
        <div style="width:80%; margin:auto; border:1px solid #ccc; padding:20px;">
            <h2>Results</h2>
            <div>
                {{ result | safe }}
            </div>
        </div>
    {% endif %}

</body>
</html>
