<!DOCTYPE html>
<html>
<head>
    <title>Water Balance Analysis</title>
</head>
<body style="text-align:center; margin-top:50px; font-family:Arial;">

    <h1>💧 Water Balance System</h1>
    <p>Upload your Excel file to analyze water balance</p>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br><br>
        <button type="submit">Upload & Analyze</button>
    </form>

    <br>

    {% if result %}
        <div style="margin:auto; width:50%; padding:20px; border:1px solid #ccc; border-radius:10px;">
            <h3>Result:</h3>
            <p>{{ result | safe }}</p>
        </div>
    {% endif %}

</body>
</html>
